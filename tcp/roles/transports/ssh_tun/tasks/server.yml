---
- name: Prepare SSH TUN server remote directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ egress_remote_dir }}"
    - "{{ egress_remote_dir }}/ssh_tun_server"

- name: Prepare SSH TUN public key
  delegate_to: localhost
  run_once: true
  ansible.builtin.set_fact:
    ssh_tun_ssh_public_key: "{{ lookup('file', ssh_tun_ssh_key_dir ~ '/id_ed25519.pub') | trim }}"
  changed_when: false

- name: Render SSH TUN server Dockerfile
  ansible.builtin.template:
    src: server/Dockerfile.j2
    dest: "{{ egress_remote_dir }}/ssh_tun_server/Dockerfile"
    mode: "0644"
  notify: restart egress stack
