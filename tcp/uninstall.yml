---
- name: Uninstall ingress stack
  hosts: ingress
  become: true
  vars_files:
    - group_vars/ingress.yml
  tasks:
    - name: Stop ingress watchdog units
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - nitka-ingress-watchdog.timer
        - nitka-ingress-watchdog.service
      failed_when: false

    - name: Stop ingress OS updater units
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - nitka-os-updater.timer
        - nitka-os-updater.service
      failed_when: false

    - name: Stop ingress docker updater units
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - nitka-ingress-docker-updater.timer
        - nitka-ingress-docker-updater.service
      failed_when: false

    - name: Stop only this ingress compose project
      ansible.builtin.command:
        cmd: docker compose down --remove-orphans
        chdir: "{{ ingress_remote_dir }}"
      failed_when: false
      changed_when: false

    - name: Remove ingress files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ingress_remote_dir }}"
        - /usr/local/sbin/nitka-ingress-watchdog
        - /usr/local/sbin/ingress_stack_ensure
        - /usr/local/sbin/nitka-ingress-docker-updater
        - /usr/local/sbin/nitka-os-updater
        - /etc/systemd/system/nitka-ingress-watchdog.service
        - /etc/systemd/system/nitka-ingress-watchdog.timer
        - /etc/systemd/system/nitka-ingress-docker-updater.service
        - /etc/systemd/system/nitka-ingress-docker-updater.timer
        - /etc/systemd/system/nitka-os-updater.service
        - /etc/systemd/system/nitka-os-updater.timer
        - /etc/logrotate.d/nitka-os-updater

    - name: Reload systemd after ingress removal
      ansible.builtin.systemd_service:
        daemon_reload: true

- name: Uninstall egress stack
  hosts: egress
  become: true
  vars_files:
    - group_vars/egress.yml
  tasks:
    - name: Stop egress docker updater timer
      ansible.builtin.systemd_service:
        name: nitka-egress-docker-updater.timer
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop egress docker updater service
      ansible.builtin.systemd_service:
        name: nitka-egress-docker-updater.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop egress OS updater units
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - nitka-os-updater.timer
        - nitka-os-updater.service
      failed_when: false

    - name: Stop only this egress compose project
      ansible.builtin.command:
        cmd: docker compose down --remove-orphans
        chdir: "{{ egress_remote_dir }}"
      failed_when: false
      changed_when: false

    - name: Remove egress files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ egress_remote_dir }}"
        - /usr/local/sbin/nitka-egress-docker-updater
        - /usr/local/sbin/nitka-os-updater
        - /etc/systemd/system/nitka-egress-docker-updater.service
        - /etc/systemd/system/nitka-egress-docker-updater.timer
        - /etc/systemd/system/nitka-os-updater.service
        - /etc/systemd/system/nitka-os-updater.timer
        - /etc/logrotate.d/nitka-os-updater

    - name: Reload systemd after egress removal
      ansible.builtin.systemd_service:
        daemon_reload: true
