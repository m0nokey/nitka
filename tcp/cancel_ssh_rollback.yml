---
- name: Cancel SSH hardening rollback timer
  hosts: all
  become: true
  tasks:
    - name: Stop rollback transient units
      ansible.builtin.shell: |
        set -euo pipefail
        systemctl stop nitka-ssh-rollback.timer nitka-ssh-rollback.service 2>/dev/null || true
        systemctl reset-failed nitka-ssh-rollback.timer nitka-ssh-rollback.service 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: false
